name: CI

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn verify --no-transfer-progress

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: dlq-surgeon-fat
          path: target/dlq-surgeon-fat.jar
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'graalvm'
          cache: maven

      - name: Build native binary and fat JAR
        run: mvn -Pnative package -DskipTests --no-transfer-progress

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/dlq-surgeon
            target/dlq-surgeon-fat.jar
          generate_release_notes: true